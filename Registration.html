<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>College Event Registration</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .form-container {
      background: #fff;
      padding: 20px 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 350px;
    }
    .form-container h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin: 10px 0 5px;
      font-weight: bold;
    }
    input[type="text"],
    input[type="email"],
    input[type="number"],
    input[type="date"],
    input[type="time"] {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .checkbox-group {
      margin-bottom: 15px;
    }
    .checkbox-group label {
      font-weight: normal;
      display: block;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #007BFF;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>College Event Registration</h2>
    <form>
      <label for="name">Your Name:</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>

      <label for="age">Age:</label>
      <input type="number" id="age" name="age" min="10" required>

      <label>Select Event Category:</label>
      <div class="checkbox-group">
        <label><input type="checkbox" name="event" value="Coding Hackathon"> Coding Hackathon</label>
        <label><input type="checkbox" name="event" value="Debate Competition"> Debate Competition</label>
        <label><input type="checkbox" name="event" value="Sports Tournament"> Sports Tournament</label>
      </div>

      <label for="date">Event Date:</label>
      <input type="date" id="date" name="date" required>

      <label for="time">Preferred Time Slot:</label>
      <input type="time" id="time" name="time" required>

      <button type="submit">Register Now</button>
    </form>
  </div>
</body>
</html>
